version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: trippi-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

  postgres:
    image: postgres:16
    container_name: trippi-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "nghiA2905@@"
      POSTGRES_DB: trippi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migration:
    build: ../trippi-be
    container_name: trippi-migration
    command: yarn migration:run
    env_file:
      - ../trippi-be/.env
    depends_on:
      - postgres

  backend:
    build: ../trippi-be
    container_name: trippi-be
    expose:
      - "8000"
    env_file:
      - ../trippi-be/.env
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully

  frontend:
    build: ../trippi-fe
    container_name: trippi-fe
    expose:
      - "3000"
    env_file:
      - ../trippi-fe/.env
    depends_on:
      - backend

volumes:
  postgres-data: